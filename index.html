<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Weather App</h1>
    <div class="header-controls">
      <label for="themeSelect" class="theme-label">Theme</label>
      <select id="themeSelect" class="theme-select" aria-label="Theme selector">
        <option value="default">Classic</option>
        <option value="neubrutal">Neubrutal</option>
        <option value="dark">Dark</option>
        <option value="glass">Glass</option>
      </select>
    </div>
    <form id="searchForm" class="search">
      <input id="cityInput" type="search" placeholder="Enter city" required />
      <button id="searchBtn" type="submit">Search</button>
    </form>
    <section id="weather" class="weather-card">
      <div id="current" class="current-placeholder">
        <p class="hint">Search a city to see current weather.</p>
      </div>
      <div id="forecast" class="forecast-container"></div>
    </section>
    <footer class="footer">Powered by OpenWeather</footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
